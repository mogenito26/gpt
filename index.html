<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asesor IA · SURA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sura-red: #C8102E;
      --sura-red-dark: #9e0d23;
      --sura-red-light: #fdeaed;
      --bg: #f5f4f0;
      --surface: #ffffff;
      --surface2: #f0eeea;
      --text: #1a1a1a;
      --text-muted: #6b6b6b;
      --text-hint: #a0a0a0;
      --border: rgba(0,0,0,0.08);
      --radius: 16px;
      --radius-sm: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.06);
      --font: 'DM Sans', sans-serif;
      --mono: 'DM Mono', monospace;
      --bubble-user-bg: var(--sura-red);
      --bubble-user-text: #fff;
      --bubble-ai-bg: #ffffff;
      --bubble-ai-text: var(--text);
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      color: var(--text);
    }

    .chat-shell {
      width: 100%;
      max-width: 480px;
      height: min(700px, 90dvh);
      background: var(--surface);
      border-radius: 24px;
      box-shadow: var(--shadow), 0 0 0 1px var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 20px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .avatar {
      width: 42px; height: 42px;
      background: var(--sura-red);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .avatar svg { width: 22px; height: 22px; fill: #fff; }
    .header-info { flex: 1; min-width: 0; }
    .header-name { font-size: 15px; font-weight: 500; letter-spacing: -0.2px; }
    .header-status {
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; color: var(--text-muted); margin-top: 1px;
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .header-badge {
      font-family: var(--mono);
      font-size: 10px;
      background: var(--sura-red-light);
      color: var(--sura-red-dark);
      padding: 3px 8px;
      border-radius: 20px;
      letter-spacing: 0.3px;
    }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg-row {
      display: flex;
      flex-direction: column;
      animation: fadeUp 0.22s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg-row.user { align-items: flex-end; }
    .msg-row.ai   { align-items: flex-start; }

    .bubble {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
    }
    .msg-row.user .bubble {
      background: var(--bubble-user-bg);
      color: var(--bubble-user-text);
      border-bottom-right-radius: 4px;
    }
    .msg-row.ai .bubble {
      background: var(--surface2);
      color: var(--bubble-ai-text);
      border-bottom-left-radius: 4px;
    }

    .meta {
      font-size: 11px;
      color: var(--text-hint);
      margin-top: 4px;
      padding: 0 4px;
    }
    .badge-caliente {
      display: inline-flex; align-items: center; gap: 4px;
      background: #fef3c7; color: #92400e;
      font-size: 10px; font-weight: 500;
      padding: 2px 7px; border-radius: 10px;
      margin-left: 4px;
    }
    .badge-caliente::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: #f59e0b; display: inline-block; }

    /* Typing indicator */
    .typing-bubble {
      background: var(--surface2);
      border-radius: 18px 18px 18px 4px;
      padding: 12px 16px;
      display: flex; gap: 5px; align-items: center;
      width: fit-content;
    }
    .typing-bubble span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text-hint);
      animation: bounce 1.2s ease-in-out infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: 0.15s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.30s; }
    @keyframes bounce {
      0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)}
    }

    /* Error bubble */
    .error-bubble {
      background: #fee2e2; color: #991b1b;
      font-size: 13px; padding: 9px 13px;
      border-radius: 10px; max-width: 78%;
      display: flex; gap: 6px; align-items: flex-start;
    }
    .error-bubble::before { content: '!'; font-weight: 700; flex-shrink: 0; }

    /* ── Input area ── */
    .input-area {
      padding: 12px 16px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      background: var(--surface2);
      border-radius: 20px;
      padding: 6px 6px 6px 16px;
      border: 1.5px solid transparent;
      transition: border-color 0.15s;
    }
    .input-row:focus-within { border-color: var(--sura-red); }
    textarea {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      resize: none;
      font-family: var(--font);
      font-size: 14px;
      color: var(--text);
      line-height: 1.5;
      max-height: 120px;
      min-height: 24px;
      padding: 4px 0;
      overflow-y: auto;
    }
    textarea::placeholder { color: var(--text-hint); }
    .send-btn {
      width: 38px; height: 38px;
      background: var(--sura-red);
      border: none; border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }
    .send-btn:hover { background: var(--sura-red-dark); }
    .send-btn:active { transform: scale(0.93); }
    .send-btn:disabled { background: var(--text-hint); cursor: not-allowed; transform: none; }
    .send-btn svg { width: 17px; height: 17px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .char-hint {
      font-size: 11px; color: var(--text-hint);
      text-align: right; margin-top: 6px; padding-right: 4px;
    }

    /* ── Welcome ── */
    .welcome {
      display: flex; flex-direction: column; align-items: center;
      gap: 10px; padding: 24px 16px; text-align: center;
    }
    .welcome-icon {
      width: 56px; height: 56px;
      background: var(--sura-red-light);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .welcome-icon svg { width: 28px; height: 28px; fill: var(--sura-red); }
    .welcome h2 { font-size: 16px; font-weight: 500; }
    .welcome p  { font-size: 13px; color: var(--text-muted); max-width: 260px; line-height: 1.5; }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 4px; }
    .chip {
      font-size: 12px; padding: 5px 12px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; cursor: pointer; color: var(--text-muted);
      transition: border-color 0.12s, color 0.12s;
    }
    .chip:hover { border-color: var(--sura-red); color: var(--sura-red); }
  </style>
</head>
<body>

<div class="chat-shell">

  <header>
    <div class="avatar">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
    </div>
    <div class="header-info">
      <div class="header-name">Asesor Virtual SURA</div>
      <div class="header-status"><span class="dot"></span> En línea</div>
    </div>
    <div class="header-badge">IA</div>
  </header>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
      </div>
      <h2>Hola, soy tu asesor SURA</h2>
      <p>Puedo ayudarte con seguros de vida, hogar, salud y más. ¿En qué te ayudo hoy?</p>
      <div class="chips">
        <span class="chip" onclick="quickSend('¿Qué seguros de vida tienen?')">Seguros de vida</span>
        <span class="chip" onclick="quickSend('¿Cuánto cuesta un seguro de hogar?')">Precio seguro hogar</span>
        <span class="chip" onclick="quickSend('Quiero cotizar un seguro de salud')">Cotizar salud</span>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea
        id="msg"
        placeholder="Escribe tu pregunta..."
        rows="1"
        maxlength="1000"
        onkeydown="handleKey(event)"
        oninput="autoResize(this); updateChar()"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="send()" title="Enviar">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div class="char-hint" id="charHint"></div>
  </div>

</div>

<script>
  const API_URL = "http://localhost:8000";
  const USER_ID = "web_" + Math.random().toString(36).slice(2, 9);
  let isLoading = false;

  const messagesEl = document.getElementById("messages");
  const msgInput   = document.getElementById("msg");
  const sendBtn    = document.getElementById("sendBtn");
  const welcomeEl  = document.getElementById("welcome");
  const charHint   = document.getElementById("charHint");

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 120) + "px";
  }

  function updateChar() {
    const len = msgInput.value.length;
    charHint.textContent = len > 800 ? `${len}/1000` : "";
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function timestamp() {
    return new Date().toLocaleTimeString("es-CO", { hour: "2-digit", minute: "2-digit" });
  }

  function appendBubble(text, role, extra = {}) {
    welcomeEl.style.display = "none";
    const row = document.createElement("div");
    row.className = `msg-row ${role}`;

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;
    row.appendChild(bubble);

    const meta = document.createElement("div");
    meta.className = "meta";
    meta.textContent = timestamp();

    if (extra.asesor) {
      const badge = document.createElement("span");
      badge.className = "badge-caliente";
      badge.textContent = `Asesor: ${extra.asesor}`;
      meta.appendChild(badge);
    }
    row.appendChild(meta);
    messagesEl.appendChild(row);
    scrollBottom();
    return row;
  }

  function showTyping() {
    const row = document.createElement("div");
    row.className = "msg-row ai";
    row.id = "typing";
    row.innerHTML = `<div class="typing-bubble"><span></span><span></span><span></span></div>`;
    messagesEl.appendChild(row);
    scrollBottom();
  }

  function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  function showError(msg) {
    removeTyping();
    const row = document.createElement("div");
    row.className = "msg-row ai";
    row.innerHTML = `<div class="error-bubble">${msg}</div>`;
    messagesEl.appendChild(row);
    scrollBottom();
  }

  function setLoading(val) {
    isLoading = val;
    sendBtn.disabled = val;
    msgInput.disabled = val;
  }

  async function send() {
    const text = msgInput.value.trim();
    if (!text || isLoading) return;

    appendBubble(text, "user");
    msgInput.value = "";
    autoResize(msgInput);
    updateChar();
    setLoading(true);
    showTyping();

    try {
      const res = await fetch(`${API_URL}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, user: USER_ID }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `Error ${res.status}`);
      }

      const data = await res.json();
      removeTyping();
      appendBubble(data.response, "ai", { asesor: data.asesor });

    } catch (err) {
      showError(err.message.includes("fetch")
        ? "No se pudo conectar con el servidor. Verifica que el backend esté corriendo."
        : err.message
      );
    } finally {
      setLoading(false);
      msgInput.focus();
    }
  }

  function quickSend(text) {
    msgInput.value = text;
    send();
  }

  msgInput.focus();
</script>
</body>
</html>
